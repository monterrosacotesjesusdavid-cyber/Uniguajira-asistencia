<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia — Universidad de La Guajira</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #006847;
    --verde-claro: #00a86b;
    --dorado: #c9a84c;
    --dorado-claro: #e8c97a;
    --oscuro: #0a1a12;
    --gris: #f4f6f3;
    --blanco: #ffffff;
    --texto: #1c2b22;
    --texto-suave: #5a7060;
    --error: #c0392b;
    --sombra: 0 20px 60px rgba(0,104,71,0.15);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--oscuro);
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #003d28 0%, #0a1a12 50%, #000d08 100%);
  }

  .bg::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(0,104,71,0.04) 80px, rgba(0,104,71,0.04) 81px),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(0,104,71,0.04) 80px, rgba(0,104,71,0.04) 81px);
  }

  .orbe {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: flotar 8s ease-in-out infinite;
  }
  .orbe-1 { width: 500px; height: 500px; background: var(--verde); top: -100px; left: -100px; animation-delay: 0s; }
  .orbe-2 { width: 400px; height: 400px; background: var(--dorado); bottom: -100px; right: -50px; animation-delay: 3s; }
  .orbe-3 { width: 300px; height: 300px; background: var(--verde-claro); top: 40%; right: 20%; animation-delay: 5s; }

  @keyframes flotar {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .container {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 24px;
    padding: 56px 48px;
    width: 100%; max-width: 460px;
    box-shadow: var(--sombra), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: entrar 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes entrar {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    text-align: center; margin-bottom: 40px;
  }

  .escudo {
    width: 72px; height: 72px; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--verde), var(--verde-claro));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px rgba(0,168,107,0.1), 0 0 0 16px rgba(0,168,107,0.05);
    font-size: 32px;
  }

  .universidad {
    font-family: 'Playfair Display', serif;
    color: var(--dorado-claro);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .sistema-nombre {
    font-family: 'Playfair Display', serif;
    color: var(--blanco);
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .subtitulo {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-weight: 300;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 32px 0;
  }

  .tabs {
    display: flex; gap: 8px; margin-bottom: 32px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px; padding: 4px;
  }

  .tab {
    flex: 1; padding: 10px; border: none;
    background: transparent; border-radius: 10px;
    color: rgba(255,255,255,0.45);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }

  .tab.activo {
    background: var(--verde);
    color: white;
    box-shadow: 0 4px 15px rgba(0,104,71,0.4);
  }

  .campo {
    margin-bottom: 18px;
  }

  label {
    display: block;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: all 0.3s;
    outline: none;
  }

  input:focus {
    border-color: var(--verde-claro);
    background: rgba(0,168,107,0.08);
    box-shadow: 0 0 0 3px rgba(0,168,107,0.15);
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-login {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--verde), var(--verde-claro));
    border: none; border-radius: 14px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: all 0.3s;
    position: relative; overflow: hidden;
    letter-spacing: 0.5px;
  }

  .btn-login::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
    opacity: 0; transition: opacity 0.3s;
  }

  .btn-login:hover::before { opacity: 1; }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,104,71,0.5); }
  .btn-login:active { transform: translateY(0); }
  .btn-login span { position: relative; z-index: 1; }

  .btn-login.cargando { opacity: 0.7; pointer-events: none; }

  .error-msg {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 16px;
    display: none;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .footer-card {
    text-align: center; margin-top: 32px;
    color: rgba(255,255,255,0.2);
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .card { padding: 40px 28px; }
    .sistema-nombre { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orbe orbe-1"></div>
<div class="orbe orbe-2"></div>
<div class="orbe orbe-3"></div>

<div class="container">
  <div class="card">
    <div class="logo-wrap">
      <div class="escudo">🎓</div>
      <div class="universidad">Universidad de La Guajira</div>
      <div class="sistema-nombre">Control de<br>Asistencia</div>
      <div class="subtitulo">Sistema institucional de registro docente</div>
    </div>

    <div class="divider"></div>

    <div class="tabs">
      <button class="tab activo" onclick="setRol('profesor')">Profesor</button>
      <button class="tab" onclick="setRol('admin')">Administrador</button>
    </div>

    <form id="formLogin" onsubmit="handleLogin(event)">
      <div class="campo">
        <label>Correo institucional</label>
        <input type="email" id="correo" placeholder="correo@uniguajira.edu.co" required autocomplete="username">
      </div>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnTexto">Ingresar al Sistema</span>
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="footer-card">© 2024 Universidad de La Guajira</div>
  </div>
</div>

<script>
  let rolActual = 'profesor';

  function setRol(rol) {
    rolActual = rol;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('activo', (rol === 'profesor' && i === 0) || (rol === 'admin' && i === 1));
    });
  }

  async function handleLogin(e) {
    e.preventDefault();
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const btnTexto = document.getElementById('btnTexto');
    const errorMsg = document.getElementById('errorMsg');

    btn.classList.add('cargando');
    btnTexto.textContent = 'Verificando...';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch(`/api/auth/${rolActual}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

      localStorage.setItem('token', data.token);
      localStorage.setItem('nombre', data.nombre);
      localStorage.setItem('rol', rolActual);

      btnTexto.textContent = '✓ Acceso concedido';
      setTimeout(() => {
        window.location.href = rolActual === 'admin' ? '/admin' : '/profesor';
      }, 600);
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      btn.classList.remove('cargando');
      btnTexto.textContent = 'Ingresar al Sistema';
    }
  }

  // Redirigir si ya está logueado
  const token = localStorage.getItem('token');
  const rol = localStorage.getItem('rol');
  if (token && rol) window.location.href = rol === 'admin' ? '/admin' : '/profesor';
</script>
</body>
</html>
